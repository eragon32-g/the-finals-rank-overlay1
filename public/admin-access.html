<!doctype html><html lang="it"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>RankTag Access Admin</title><link rel="stylesheet" href="/style.css?v=034"><style>body{margin:0;min-height:100vh;background:#06070b;color:#f5f7fb;font-family:Arial,Helvetica,sans-serif;padding:24px}.page{width:min(1120px,100%);margin:auto}.panel{border:1px solid rgba(255,255,255,.12);border-radius:22px;background:rgba(18,21,30,.96);padding:20px;margin:14px 0}.nav a,.tag{border:1px solid rgba(255,255,255,.14);border-radius:999px;padding:9px 13px;background:rgba(255,255,255,.06);color:#fff;text-decoration:none;font-weight:900;font-size:12px}.nav{display:flex;gap:10px;flex-wrap:wrap}input,select{border:1px solid rgba(255,255,255,.14);background:rgba(0,0,0,.30);color:#fff;border-radius:12px;padding:11px 12px;font-weight:800}.btn{border:0;border-radius:13px;padding:11px 14px;background:#ef1724;color:#fff;font-weight:1000;cursor:pointer}.grid{display:grid;grid-template-columns:1fr 180px 160px auto;gap:10px;align-items:end}.code{display:grid;grid-template-columns:1.3fr .7fr .7fr .7fr;gap:8px;padding:10px;border-bottom:1px solid rgba(255,255,255,.08)}.muted{color:rgba(245,247,251,.65)}@media(max-width:760px){.grid,.code{grid-template-columns:1fr}}</style></head><body><main class="page"><div class="nav"><a href="/home.html">Home</a><a href="/account.html">Account</a><a href="/builder.html">Builder</a><span class="tag">BETA 0.3.4</span></div><h1>Access Codes Admin</h1><p class="muted">Gestione locale dei codici single-use. Per produzione servirà collegare questa logica a un database/server.</p><section class="panel"><div class="grid"><label>Nuovo codice<br><input id="code" placeholder="RT-30D-CLIENTE-001"></label><label>Tipo<br><select id="type"><option value="temporary">Temporaneo</option><option value="permanent">Permanente</option></select></label><label>Giorni<br><input id="days" type="number" min="1" value="30"></label><button class="btn" id="add">Crea codice</button></div></section><section class="panel"><h2>Codici</h2><div id="codes"></div></section></main><script src="/access.js?v=034"></script><script>const $=id=>document.getElementById(id);function render(){const codes=RankTagAccess.listCodes();$("codes").innerHTML=codes.map(c=>`<div class="code"><b>${c.code}</b><span>${c.type==='permanent'?'Permanente':(c.days+' giorni')}</span><span>${c.usedBy?'Usato':'Disponibile'}</span><span class="muted">${c.usedBy||''}</span></div>`).join('');}$("add").onclick=()=>{try{RankTagAccess.addCode($("code").value,$("type").value,$("days").value);$("code").value='';render();}catch(e){alert(e.message||e)}};render();</script></body></html>
