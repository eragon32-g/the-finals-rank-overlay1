<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Generator THE FINALS Overlay</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
      background: #0b0b0f;
      color: white;
      display: grid;
      place-items: center;
      padding: 24px;
    }
    .card {
      width: min(800px, 100%);
      background: #15151b;
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 18px;
      padding: 24px;
      box-shadow: 0 20px 60px rgba(0,0,0,.45);
    }
    h1 { margin-top: 0; }
    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }
    label { display: grid; gap: 6px; font-weight: 700; font-size: 14px; }
    input, select, textarea {
      width: 100%;
      border: 1px solid rgba(255,255,255,.18);
      border-radius: 12px;
      background: #0d0d12;
      color: white;
      padding: 12px;
      font-size: 15px;
    }
    textarea { min-height: 94px; resize: vertical; grid-column: 1 / -1; }
    button {
      border: 0;
      border-radius: 12px;
      background: #ff1f35;
      color: white;
      padding: 13px 18px;
      font-weight: 900;
      cursor: pointer;
      margin-top: 14px;
    }
    .hint {
      color: rgba(255,255,255,.68);
      font-size: 14px;
      line-height: 1.45;
    }
    .full { grid-column: 1 / -1; }
    @media (max-width: 650px) { .grid { grid-template-columns: 1fr; } .full { grid-column: auto; } }
  </style>
</head>
<body>
  <main class="card">
    <h1>THE FINALS Overlay Generator</h1>
    <p class="hint">V7: ora puoi scegliere lo stemma preciso: Bronze IV, III, II, I fino a Diamond I e Ruby. Così non resta sempre sull'icona con il numero 1.</p>

    <div class="grid">
      <label>
        Modalità
        <select id="mode">
          <option value="auto">Automatica leaderboard</option>
          <option value="manual">Manuale</option>
        </select>
      </label>

      <label>
        Player / Embark ID
        <input id="player" value="erdragon32#2577" />
      </label>

      <label>
        Rank da mostrare
        <select id="badgeFile">
          <option value="bronze-4">Bronze IV</option>
          <option value="bronze-3">Bronze III</option>
          <option value="bronze-2">Bronze II</option>
          <option value="bronze-1">Bronze I</option>
          <option value="silver-4">Silver IV</option>
          <option value="silver-3">Silver III</option>
          <option value="silver-2">Silver II</option>
          <option value="silver-1">Silver I</option>
          <option value="gold-4">Gold IV</option>
          <option value="gold-3">Gold III</option>
          <option value="gold-2">Gold II</option>
          <option value="gold-1">Gold I</option>
          <option value="platinum-4">Platinum IV</option>
          <option value="platinum-3">Platinum III</option>
          <option value="platinum-2">Platinum II</option>
          <option value="platinum-1">Platinum I</option>
          <option value="diamond-4">Diamond IV</option>
          <option value="diamond-3">Diamond III</option>
          <option value="diamond-2">Diamond II</option>
          <option value="diamond-1">Diamond I</option>
          <option value="ruby">Ruby</option>
        </select>
      </label>

      <label>
        Punti RS
        <input id="rankScore" value="37705" inputmode="numeric" />
      </label>

      <label>
        Colore testo
        <input id="textColor" value="ffffffff" />
      </label>

      <label>
        Colore bordo
        <input id="borderColor" value="8d95a0ff" />
      </label>

      <label>
        Sfondo
        <input id="backgroundColor" value="101116ee" />
      </label>

      <label>
        Spessore bordo
        <input id="borderWidth" value="2" inputmode="numeric" />
      </label>

      <textarea id="output" readonly></textarea>
    </div>

    <button id="generate">Genera link</button>
    <button id="copy">Copia link</button>
  </main>

  <script>
    const get = (id) => document.getElementById(id);

    const rankMap = {
      "bronze-4": ["Bronze", "IV"],
      "bronze-3": ["Bronze", "III"],
      "bronze-2": ["Bronze", "II"],
      "bronze-1": ["Bronze", "I"],
      "silver-4": ["Silver", "IV"],
      "silver-3": ["Silver", "III"],
      "silver-2": ["Silver", "II"],
      "silver-1": ["Silver", "I"],
      "gold-4": ["Gold", "IV"],
      "gold-3": ["Gold", "III"],
      "gold-2": ["Gold", "II"],
      "gold-1": ["Gold", "I"],
      "platinum-4": ["Platinum", "IV"],
      "platinum-3": ["Platinum", "III"],
      "platinum-2": ["Platinum", "II"],
      "platinum-1": ["Platinum", "I"],
      "diamond-4": ["Diamond", "IV"],
      "diamond-3": ["Diamond", "III"],
      "diamond-2": ["Diamond", "II"],
      "diamond-1": ["Diamond", "I"],
      "ruby": ["Ruby", ""]
    };

    function buildLink() {
      const url = new URL(window.location.origin + "/");
      const mode = get("mode").value;
      const player = get("player").value.trim();
      const badgeFile = get("badgeFile").value;
      const [league, division] = rankMap[badgeFile] || ["Unranked", ""];

      if (mode === "manual") {
        url.searchParams.set("mode", "manual");
        url.searchParams.set("player", player);
        url.searchParams.set("league", league);
        url.searchParams.set("division", division);
        url.searchParams.set("rankScore", get("rankScore").value.trim());
        url.searchParams.set("badgeFile", badgeFile);
      } else {
        if (player.includes("#")) {
          const [name, number] = player.split("#");
          url.searchParams.set("embarkIdName", name);
          url.searchParams.set("embarkIdNumber", number);
        } else {
          url.searchParams.set("player", player);
        }
        url.searchParams.set("leaderboard", "s10");
      }

      url.searchParams.set("textColor", get("textColor").value.trim());
      url.searchParams.set("backgroundColor", get("backgroundColor").value.trim());
      url.searchParams.set("borderColor", get("borderColor").value.trim());
      url.searchParams.set("borderWidth", get("borderWidth").value.trim());

      get("output").value = url.toString();
    }

    get("generate").addEventListener("click", buildLink);
    get("copy").addEventListener("click", async () => {
      buildLink();
      await navigator.clipboard.writeText(get("output").value);
      get("copy").textContent = "Copiato!";
      setTimeout(() => get("copy").textContent = "Copia link", 1200);
    });

    buildLink();
  </script>
</body>
</html>
