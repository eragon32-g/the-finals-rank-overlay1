<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>THE FINALS Rank Overlay</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <main id="overlay" class="overlay">
    <section id="badge" class="badge loading">
      <div class="rank-mark">
        <img id="badgeImage" class="badge-image hidden" alt="rank badge" />
        <div id="rankIcon" class="rank-icon">TF</div>
      </div>

      <div class="card-shell">
        <div class="card-highlight"></div>
        <div class="rank-info">
          <div class="title-row">
            <div id="rankText" class="rank-text">RANKED</div>
            <div id="statusText" class="status">LIVE</div>
          </div>
          <div class="meta-row">
            <div id="scoreText" class="score-text">RS: 0</div>
            <div id="nameText" class="name-text">THE FINALS</div>
          </div>
        </div>
      </div>
    </section>
  </main>

  <script src="/app.js"></script>
</body>
</html>
