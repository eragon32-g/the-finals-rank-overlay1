<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>THE FINALS Rank Overlay</title>
  <link rel="stylesheet" href="/style.css?v=060" />
</head>
<body>
  <main id="overlay" class="overlay">
    <section id="badge" class="badge loading">
      <div class="rank-mark">
        <img id="badgeImage" class="badge-image hidden" alt="rank badge" />
        <div id="rankIcon" class="rank-icon">TF</div>
      </div>

      <div class="card-shell">
        <div class="card-top-gloss"></div>
        <div class="card-bottom-line"></div>
        <div class="card-side-glow"></div>

        <div class="rank-info">
          <div class="title-row">
            <div id="rankText" class="rank-text">PLATINUM I</div>
            <div id="statusText" class="status hidden">LIVE</div>
          </div>

          <div class="meta-row">
            <div id="scoreText" class="score-text">ELO: 37705</div>
            <div id="nameText" class="name-text">ERDRAGON3#2577</div>
          </div>
        </div>

        <div id="brandDrawer" class="brand-drawer">
          <div class="brand-icon"></div>
          <div class="brand-marquee">
            <span id="brandMarqueeText"></span>
          </div>
        </div>
      </div>
    </section>
  </main>

  <script src="/app.js?v=060"></script>
</body>
</html>
